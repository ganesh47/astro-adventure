name: M0 Scene Validation

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/m0-scene-validation.yml"
      - "AstroAdventureM0/**"
      - "tools/validate-m0-scene.sh"
      - ".gitignore"
  pull_request:
    paths:
      - ".github/workflows/m0-scene-validation.yml"
      - "AstroAdventureM0/**"
      - "tools/validate-m0-scene.sh"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reject tracked Unity generated folders
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)AstroAdventureM0/(Library|Logs|UserSettings|Temp|Obj|Build|Builds)/'; then
            echo "Generated Unity folders must not be tracked."
            exit 1
          fi

      - name: Check validation script syntax
        run: bash -n tools/validate-m0-scene.sh

      - name: Check required M0 files
        run: |
          set -euo pipefail
          test -f AstroAdventureM0/Assets/Scenes/M0_DeploymentProof.unity
          test -f AstroAdventureM0/Assets/Scripts/M0ControllerTest.cs
          test -f AstroAdventureM0/Assets/Editor/M0SceneValidator.cs
          test -f AstroAdventureM0/Assets/Input/AstroAdventureControls.inputactions
          test -f AstroAdventureM0/Packages/manifest.json
          test -f AstroAdventureM0/ProjectSettings/ProjectVersion.txt

  unity-scene-validation:
    name: Unity Scene Validation
    runs-on: ubuntu-latest
    needs: repo-hygiene
    env:
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
      UNITY_IMAGE: unityci/editor:ubuntu-6000.4.2f1-base-3.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Explain skipped Unity validation secrets
        if: env.UNITY_SERIAL == '' || env.UNITY_EMAIL == '' || env.UNITY_PASSWORD == ''
        run: |
          echo "::notice::Unity scene validation is skipped until UNITY_SERIAL, UNITY_EMAIL, and UNITY_PASSWORD are configured."
          echo "::notice::UNITY_SERIAL is extracted from the Unity Personal .ulf DeveloperData field."

      - name: Cache Unity Library
        if: env.UNITY_SERIAL != '' && env.UNITY_EMAIL != '' && env.UNITY_PASSWORD != ''
        uses: actions/cache@v5
        with:
          path: AstroAdventureM0/Library
          key: Library-AstroAdventureM0-${{ runner.os }}-${{ hashFiles('AstroAdventureM0/Packages/packages-lock.json', 'AstroAdventureM0/ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-AstroAdventureM0-${{ runner.os }}-

      - name: Run Unity scene validator
        if: env.UNITY_SERIAL != '' && env.UNITY_EMAIL != '' && env.UNITY_PASSWORD != ''
        run: |
          set -euo pipefail
          mkdir -p artifacts/scene-validation
          cleanup_permissions() {
            sudo chown -R "$(id -u):$(id -g)" AstroAdventureM0/Library artifacts/scene-validation 2>/dev/null || true
          }
          trap cleanup_permissions EXIT
          docker run --rm \
            -e HOME=/tmp/unity-home \
            -e UNITY_EMAIL \
            -e UNITY_PASSWORD \
            -e UNITY_SERIAL \
            -e ASTRO_SCENE_VALIDATION_DIR=/workspace/artifacts/scene-validation \
            -v "${PWD}:/workspace" \
            -w /workspace \
            "${UNITY_IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p "${HOME}/.local/share/unity3d/Unity"
              return_license() {
                unity-editor \
                  -batchmode \
                  -nographics \
                  -quit \
                  -returnlicense \
                  -username "${UNITY_EMAIL}" \
                  -password "${UNITY_PASSWORD}" \
                  -logFile /workspace/artifacts/scene-validation/unity-return-license.log \
                  >/dev/null 2>&1 || true
              }
              trap return_license EXIT
              unity-editor \
                -batchmode \
                -nographics \
                -quit \
                -username "${UNITY_EMAIL}" \
                -password "${UNITY_PASSWORD}" \
                -serial "${UNITY_SERIAL}" \
                -logFile /workspace/artifacts/scene-validation/unity-activation.log
              unity-editor \
                -batchmode \
                -nographics \
                -quit \
                -projectPath /workspace/AstroAdventureM0 \
                -executeMethod M0SceneValidator.Run \
                -logFile /workspace/artifacts/scene-validation/unity-validation.log
            '

      - name: Create validation MP4
        if: always() && env.UNITY_SERIAL != '' && env.UNITY_EMAIL != '' && env.UNITY_PASSWORD != ''
        run: |
          set -euo pipefail
          if compgen -G "artifacts/scene-validation/*.png" > /dev/null && command -v ffmpeg >/dev/null 2>&1; then
            ffmpeg -y \
              -framerate 1 \
              -pattern_type glob \
              -i "artifacts/scene-validation/*.png" \
              -vf "scale=1280:-2,format=yuv420p" \
              "artifacts/scene-validation/m0-scene-validation.mp4"
          fi

      - name: Upload scene validation artifacts
        if: always() && env.UNITY_SERIAL != '' && env.UNITY_EMAIL != '' && env.UNITY_PASSWORD != ''
        uses: actions/upload-artifact@v6
        with:
          name: m0-scene-validation
          path: artifacts/scene-validation
          if-no-files-found: warn
